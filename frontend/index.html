<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA Local — Phi-3 + PDF + Áudio</title>
    <meta name="description" content="Chat com IA local usando Phi-3, com suporte a PDF e transcrição de áudio. Tudo rodando na sua máquina.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <!-- ─── Header ────────────────────────────────────── -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <h1>Chat IA Local</h1>
                </div>
                <span class="model-badge">phi3</span>
            </div>
            <div class="header-right">
                <button id="btn-new-chat" class="btn-header" title="Nova conversa">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Nova conversa</span>
                </button>
            </div>
        </header>

        <!-- ─── Context Badges (PDF / Áudio carregados) ─── -->
        <div class="context-bar" id="context-badges"></div>

        <!-- ─── Chat Messages ─────────────────────────────── -->
        <main class="chat-area" id="chat-area">
            <div class="messages" id="messages">
                <!-- Welcome Screen -->
                <div class="welcome" id="welcome">
                    <div class="welcome-glow"></div>
                    <div class="welcome-icon">🤖</div>
                    <h2>Olá! Sou seu assistente IA local</h2>
                    <p>Tudo roda na sua máquina — sem nuvem, sem custos, sem limites.</p>
                    <div class="welcome-features">
                        <div class="feature">
                            <span class="feature-icon">💬</span>
                            <span class="feature-label">Chat direto</span>
                            <span class="feature-desc">Converse com Phi-3</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">📄</span>
                            <span class="feature-label">Leitura de PDF</span>
                            <span class="feature-desc">Extraia e pergunte</span>
                        </div>
                        <div class="feature">
                            <span class="feature-icon">🎤</span>
                            <span class="feature-label">Áudio para texto</span>
                            <span class="feature-desc">Transcrição Whisper</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ─── Input Area ────────────────────────────────── -->
        <footer class="input-area">
            <div class="input-container">
                <button id="btn-pdf" class="btn-attach" title="Carregar PDF">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
                <button id="btn-audio" class="btn-attach" title="Carregar Áudio">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <div class="input-wrapper">
                    <textarea
                        id="user-input"
                        placeholder="Digite sua mensagem..."
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                </div>
                <button id="btn-send" class="btn-send" title="Enviar mensagem" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                Phi-3 Mini · Enter para enviar · Shift+Enter para nova linha
            </div>
        </footer>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="pdf-input" accept=".pdf" hidden>
    <input type="file" id="audio-input" accept=".mp3,.mp4,.wav,.m4a,.ogg,.webm" hidden>

    <!-- PDF.js (extração de texto no browser, sem backend) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
